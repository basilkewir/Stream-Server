services:
  flussonic:
    image: ossrs/srs:6
    container_name: hybridstream-flussonic
    restart: unless-stopped
    ports:
      - "1935:1935"       # RTMP ingest
      - "8080:8080"       # HTTP API / Admin UI
      - "8082:8080"       # HLS/DASH (same port, aliased for .env compat)
      - "554:554"         # RTSP
      - "10000:10000/udp" # SRT
    volumes:
      - ./docker/srs/srs.conf:/usr/local/srs/conf/srs.conf:ro
      - flussonic_data:/usr/local/srs/objs
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  redis:
    image: redis:7-alpine
    container_name: hybridstream-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  flussonic_data:

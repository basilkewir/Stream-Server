# Flussonic Media Server Configuration v24.02
# Port assignments (non-conflicting with Laravel):
#   RTMP: 1935    SRT: 10000    RTSP: 554
#   API/UI: 8080  HTTP/HLS: 80 (mapped to host 8082 via Docker)

http 80;
rtmp 1935;
rtsp 554;
pulsedb /var/lib/flussonic/pulsedb;

# API and Admin UI on 8080
api 8080;

# SRT ingest on 10000/udp
srt 10000;

# HLS settings
hls {
  segment_duration 4;
  segment_count 10;
}

# Logging
log /var/log/flussonic/flussonic.log;

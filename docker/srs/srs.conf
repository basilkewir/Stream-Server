listen              1935;
max_connections     1000;
http_api {
    enabled         on;
    listen          8080;
}
http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
}
rtc_server {
    enabled on;
    listen 8000;
}
vhost __defaultVhost__ {
    hls {
        enabled     on;
        hls_path    ./objs/nginx/html;
        hls_fragment 4;
        hls_window  40;
    }
    http_remux {
        enabled     on;
        mount       [vhost]/[app]/[stream].flv;
    }
}
